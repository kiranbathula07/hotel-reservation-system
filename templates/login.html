<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - LuxeHotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <main class="main-wrapper">
    <div class="card auth-card">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <i class="fa-solid fa-hotel" style="font-size: 3rem; color: var(--primary-color);"></i>
      </div>
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Sign in to your LuxeHotel account.</p>

      <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
      </div>

      <form action="/login" method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
        Don't have an account? <a href="/register" style="color: var(--primary-color); font-weight: 600;">Register Here</a>
      </p>
    </div>
  </main>
</body>
</html>
