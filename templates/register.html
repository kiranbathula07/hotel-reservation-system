<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - LuxeHotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <main class="main-wrapper">
    <div class="card auth-card" style="max-width: 600px;">
      <h1 class="title">Create an Account</h1>
      <p class="subtitle">Join LuxeHotel to book luxury rooms effortlessly.</p>

      <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
      </div>

      <form action="/register" method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>
          <div class="form-group full-width">
            <label for="address">Mailing Address</label>
            <input type="text" id="address" name="address">
          </div>
          <div class="form-group full-width">
            <label for="id_proof">ID Proof Number</label>
            <input type="text" id="id_proof" name="id_proof">
          </div>
          <div class="form-group full-width" style="margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </div>
        </div>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
        Already have an account? <a href="/login" style="color: var(--primary-color); font-weight: 600;">Login Here</a>
      </p>
    </div>
  </main>
</body>
</html>
