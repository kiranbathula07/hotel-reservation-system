<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success - LuxeHotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <i class="fa-solid fa-hotel"></i> LuxeHotel
    </a>
    <div class="nav-links">
      <a href="/"><i class="fa-solid fa-house"></i> Home</a>
      <a href="/bookings"><i class="fa-solid fa-list-check"></i> Bookings</a>
    </div>
  </nav>

  <main class="main-wrapper">
    <div class="container" style="max-width: 500px;">
      <div class="card status-card">
        <div class="status-icon">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1 class="title">Payment Successful!</h1>
        <p class="subtitle" style="margin-bottom: 2rem;">Your reservation is fully confirmed.</p>
        
        <div class="payment-details" style="text-align: left; margin-bottom: 2rem; background: var(--secondary-color); padding: 1.5rem; border-radius: 8px;">
          <p><span>Booking ID:</span> <strong>#{{ booking_id }}</strong></p>
          <p><span>Amount Paid:</span> <strong><span class="badge badge-success">₹{{ amount }}</span></strong></p>
          <p><span>Method:</span> <strong>{{ method }}</strong></p>
        </div>

        <a href="/bookings" class="btn btn-primary" style="margin-bottom: 1rem;">
          <i class="fa-solid fa-list"></i> View All Bookings
        </a>
        <a href="/" class="btn btn-outline">
          <i class="fa-solid fa-arrow-left"></i> Return Home
        </a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 LuxeHotel Reservations. All rights reserved.</p>
  </footer>
</body>
</html>
